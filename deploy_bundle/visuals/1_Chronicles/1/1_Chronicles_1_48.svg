rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Samlah</text><text x="11649" y="403" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· of Masrekah</text><text x="11649" y="462" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Shaul</text><text x="11649" y="477" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· of Rehoboth by the River</text><text x="11649" y="536" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Baal Hanan</text><text x="11649" y="551" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· son of Achbor</text><text x="11649" y="610" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Hadad</text><text x="11649" y="625" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· his city: Pai</text><text x="11649" y="684" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Mehetabel</text><text x="11649" y="699" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· his wife, daughter of Matred</text><rect x="12024" y="8" width="1215" height="186" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><text
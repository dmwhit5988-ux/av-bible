<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576" font-family="Georgia, 'Times New Roman', serif"><rect x="0" y="0" width="1024" height="576" fill="rgb(16,16,24)" /><g transform="translate(-7149.36 144.48)"><g transform="scale(1.12)"><rect x="0" y="8" width="1796" height="534" rx="18" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><text x="898" y="259" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Reuben, the firstborn</text><text x="898" y="293" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 1–10</text><rect x="2036" y="8" width="1769" height="534" rx="18" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><text x="2920.5" y="259" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The sons of Gad</text><text x="2920.5" y="293" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 11–17</text><rect x="4045" y="8" width="1965" height="186" rx="18" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><text x="5027.5" y="85" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The war with the Hagrites</text><text x="5027.5" y="119" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 18–22</text><text x="6270" y="26" font-size="30" text-anchor="start" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The half-tribe of Manasseh</text><polyline points="6840.5,105 6840.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="6683,132 6945,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="6737.5,132 6737.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="6808.5,132 6808.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="6873.5,132 6873.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="6945,132 6945,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="6683,132 6683,171" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="6784.5,132 6784.5,171" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="6942,132 6942,171" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="8120.5,105 8120.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="7961.5,132 8236,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="7961.5,132 7961.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="8041,132 8041,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="8117,132 8117,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="8236,132 8236,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="6270" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">they increased from Bashan to Baal Hermon,</text><text x="6270" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Senir, and Mount Hermon</text><text x="6840.5" y="92" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">the heads of their fathers’ houses:</text><text x="6737.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Epher</text><text x="6808.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Ishi</text><text x="6873.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Eliel</text><text x="6945" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Azriel</text><text x="6683" y="184" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Jeremiah</text><text x="6784.5" y="184" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Hodaviah</text><text x="6942" y="184" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Jahdiel</text><text x="6942" y="199" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· mighty men of valor, famous men</text><text x="7109" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">but they played the prostitute after the gods</text><text x="7109" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">of the peoples of the land — so God stirred up</text><text x="7531" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Pul</text><text x="7531" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· king of Assyria</text><text x="7756" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Tilgath Pilneser</text><text x="7756" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· king of Assyria — who carried…</text><text x="8120.5" y="92" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Reuben, Gad, and half-Manasseh, to</text><text x="7961.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Halah</text><text x="8041" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Habor</text><text x="8117" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Hara</text><text x="8236" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Gozan</text><text x="8236" y="165" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· the river of — to this day</text><rect x="6703" y="137" width="69" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><rect x="6782" y="137" width="53" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><rect x="6845" y="137" width="57" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><rect x="6912" y="137" width="66" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><rect x="6638" y="171" width="90" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><rect x="6738" y="171" width="93" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><rect x="6841" y="171" width="202" height="42" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /></g></g><rect x="0" y="0" width="1024" height="74" fill="rgb(16,16,24)" fill-opacity="0.910" /><rect x="0" y="534" width="1024" height="42" fill="rgb(16,16,24)" fill-opacity="0.910" /><text x="28" y="20" font-size="24" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The half-tribe of Manasseh — 1 Chronicles 5</text><text x="28" y="52" font-size="18" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verse 24 — These were the heads of their fathers’ houses: even Epher, Ishi, Eliel, Azriel, Jeremiah, Hodaviah, and…</text><text x="28" y="550" font-size="14" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">names as spelled in the World English Bible</text><text x="996" y="550" font-size="14" text-anchor="end" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">1 Chronicles 5:24</text></svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576" font-family="Georgia, 'Times New Roman', serif"><rect x="0" y="0" width="1024" height="576" fill="rgb(16,16,24)" /><g transform="translate(-4836.56 172.48)"><g transform="scale(1.12)"><rect x="0" y="8" width="1796" height="534" rx="18" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><text x="898" y="259" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Reuben, the firstborn</text><text x="898" y="293" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 1–10</text><rect x="2036" y="8" width="1769" height="534" rx="18" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><text x="2920.5" y="259" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The sons of Gad</text><text x="2920.5" y="293" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 11–17</text><text x="4065" y="26" font-size="30" text-anchor="start" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The war with the Hagrites</text><polyline points="4775.5,105 4775.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="4686.5,132 4859.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="4686.5,132 4686.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="4770.5,132 4770.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="4859.5,132 4859.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="5471.5,105 5471.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="5336,132 5603.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="5336,132 5336,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="5426,132 5426,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="5515,132 5515,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="5603.5,132 5603.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="4065" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Reuben, Gad, and half-Manasseh:</text><text x="4474" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">44,760 men</text><text x="4474" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· able for war, skillful with bow and…</text><text x="4775.5" y="92" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">they made war with the Hagrites —</text><text x="4686.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Jetur</text><text x="4770.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Naphish</text><text x="4859.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Nodab</text><text x="4972" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">they cried to God in the battle, and he</text><text x="4972" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">answered, because they trusted in him</text><text x="5471.5" y="92" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">they took away:</text><text x="5336" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">50,000</text><text x="5336" y="165" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· camels</text><text x="5426" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">250,000</text><text x="5426" y="165" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· sheep</text><text x="5515" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">2,000</text><text x="5515" y="165" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· donkeys</text><text x="5603.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">100,000</text><text x="5603.5" y="165" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· men</text><text x="5711" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">many fell slain, for the war was of God;</text><text x="5711" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">they lived there until the captivity</text><rect x="6250" y="8" width="2090" height="220" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="7295" y="102" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The half-tribe of Manasseh</text><text x="7295" y="136" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 23–26</text><rect x="4655" y="137" width="63" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><rect x="4728" y="137" width="85" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><rect x="4823" y="137" width="73" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /></g></g><rect x="0" y="0" width="1024" height="74" fill="rgb(16,16,24)" fill-opacity="0.910" /><rect x="0" y="534" width="1024" height="42" fill="rgb(16,16,24)" fill-opacity="0.910" /><text x="28" y="20" font-size="24" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The war with the Hagrites — 1 Chronicles 5</text><text x="28" y="52" font-size="18" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verse 19 — They made war with the Hagrites, with Jetur, and Naphish, and Nodab.</text><text x="28" y="550" font-size="14" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">names as spelled in the World English Bible</text><text x="996" y="550" font-size="14" text-anchor="end" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">1 Chronicles 5:19</text></svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576" font-family="Georgia, 'Times New Roman', serif"><rect x="0" y="0" width="1024" height="576" fill="rgb(16,16,24)" /><g transform="translate(-1501.76 75.04)"><g transform="scale(1.12)"><text x="20" y="26" font-size="30" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The first to return</text><polyline points="582.5,105 582.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="392.5,132 727,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="392.5,132 392.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="483,132 483,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="590,132 590,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="727,132 727,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><text x="20" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">all Israel was listed by genealogies —</text><text x="20" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">written in the book of the kings of Israel;</text><text x="20" y="140" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Judah was carried to Babylon</text><text x="20" y="164" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">for their disobedience</text><text x="582.5" y="92" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">the first to live again in their cities:</text><text x="392.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Israel</text><text x="483" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">the priests</text><text x="590" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">the Levites</text><text x="727" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">the temple servants</text><text x="871" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">and in Jerusalem lived children of Judah,</text><text x="871" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Benjamin, Ephraim, and Manasseh</text><text x="1438" y="26" font-size="30" text-anchor="start" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Of Judah and Benjamin in Jerusalem</text><polyline points="1798,105 1798,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="1798,163 1798,195" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="1798,221 1798,253" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="1798,279 1798,311" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="2655,105 2655,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="2655,163 2655,195" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="2655,221 2655,253" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="3001,105 3001,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="3001,163 3001,195" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="3157,105 3157,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="3157,163 3157,195" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="3157,221 3157,253" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="1438" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">of Judah — of the children of Perez:</text><text x="1798" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Uthai</text><text x="1798" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Ammihud</text><text x="1798" y="208" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Omri</text><text x="1798" y="266" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Imri</text><text x="1798" y="324" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Bani</text><text x="2002" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Asaiah</text><text x="2002" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· the firstborn, of the Shilonites</text><text x="2259.5" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Jeuel</text><text x="2259.5" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· of the sons of Zerah — 690 brothers</text><text x="2431" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">of Benjamin:</text><text x="2655" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Sallu</text><text x="2655" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Meshullam</text><text x="2655" y="208" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Hodaviah</text><text x="2655" y="266" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Hassenuah</text><text x="2838.5" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Ibneiah</text><text x="2838.5" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· the son of Jeroham</text><text x="3001" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Elah</text><text x="3001" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Uzzi</text><text x="3001" y="208" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Michri</text><text x="3157" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Meshullam</text><text x="3157" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Shephatiah</text><text x="3157" y="208" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Reuel</text><text x="3157" y="266" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Ibnijah</text><text x="3281" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">956 brothers by their generations —</text><text x="3281" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">all heads of fathers’ households</text><rect x="3796" y="8" width="1218" height="418" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="4405" y="201" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The priests</text><text x="4405" y="235" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 10–13</text><rect x="5254" y="8" width="1293" height="302" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="5900.5" y="143" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The Levites</text><text x="5900.5" y="177" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 14–16</text><rect x="6787" y="8" width="2173" height="368" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="7873.5" y="176" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The gatekeepers</text><text x="7873.5" y="210" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 17–27</text><rect x="9200" y="8" width="936" height="248" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="9668" y="116" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Duties of the temple service</text><text x="9668" y="150" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 28–34</text><rect x="10376" y="8" width="2400" height="956" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="11576" y="470" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The house of Saul, again</text><text x="11576" y="504" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 35–44</text><rect x="1762.5" y="79" width="71" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><rect x="1746" y="137" width="104" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><rect x="1764" y="195" width="68" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><rect x="1766.5" y="253" width="63" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><rect x="1768.5" y="311" width="59" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /></g></g><rect x="0" y="0" width="1024" height="74" fill="rgb(16,16,24)" fill-opacity="0.910" /><rect x="0" y="534" width="1024" height="42" fill="rgb(16,16,24)" fill-opacity="0.910" /><text x="28" y="20" font-size="24" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Of Judah and Benjamin in Jerusalem — 1 Chronicles 9</text><text x="28" y="52" font-size="18" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verse 4 — Uthai the son of Ammihud, the son of Omri, the son of Imri, the son of Bani, of the children of Perez the…</text><text x="28" y="550" font-size="14" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">each line reads downward: the son of, the son of …</text><text x="996" y="550" font-size="14" text-anchor="end" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">1 Chronicles 9:4</text></svg>
138,129,95)" stroke-width="2" /><polyline points="875.5,395 875.5,427" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="875.5,453 875.5,485" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="1206,105 1206,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="1067.5,132 1301,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="1067.5,132 1067.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="1162.5,132 1162.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2" /><polyline points="1301,132 1301,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="20" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Reuben was the firstborn, but he defiled</text><text x="20" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">his father’s couch — his birthright went to</text><text x="20" y="140" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">the sons of Joseph; from Judah came the prince</text><text x="561.5" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Reuben</text><text x="442.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Hanoch</text><text x="524" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Pallu</text><text x="603.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Hezron</text><text x="686.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Carmi</text><text x="875.5" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Joel</text><text x="875.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Shemaiah</text><text x="875.5" y="208" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Gog</text><text x="875.5" y="266" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Shimei</text><text x="875.5" y="324" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Micah</text><text x="875.5" y="382" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Reaiah</text><text x="875.5" y="440" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Baal</text><text x="875.5" y="498" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Beerah</text><text x="875.5" y="513" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· prince of the Reubenites, exiled</text><text x="1206" y="92" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">his brothers by their families:</text><text x="1067.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Jeiel</text><text x="1067.5" y="165" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· the chief</text><text x="1162.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Zechariah</text><text x="1301" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Bela</text><text x="1301" y="165" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· son of Azaz, son of Shema</text><text x="1448" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">they lived in Aroer, to Nebo and Baal Meon,</text><text x="1448" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">eastward toward the Euphrates — and in Saul’s</text><text x="1448" y="140" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">days they defeated the Hagrites in their tents</text><rect x="2036" y="8" width="1769" height="534" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="2920.5" y="259" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The sons of Gad</text><text x="2920.5" y="293" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 11–17</text><rect x="4045" y="8" width="1965" height="186" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="5027.5" y="85" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The war with the Hagrites</text><text x="5027.5" y="119" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 18–22</text><rect x="6250" y="8" width="2090" height="220" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="7295" y="102" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The half-tribe of Manasseh</text><text x="7295" y="136" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 23–26</text><rect x="1030" y="137" width="75" height="42" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><rect x="1115" y="137" width="95" height="26" rx="8" fill="none" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /></g></g><rect x="0" y="0" width="1024" height="74" fill="rgb
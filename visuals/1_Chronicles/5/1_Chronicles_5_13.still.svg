oke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="2225" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Gad</text><text x="2225" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· over against them, in Bashan to…</text><text x="2089.5" y="166" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Joel</text><text x="2089.5" y="181" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· the chief</text><text x="2183" y="166" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Shapham</text><text x="2183" y="181" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· the second</text><text x="2271.5" y="166" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Janai</text><text x="2356" y="166" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Shaphat</text><text x="2356" y="181" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· in Bashan</text><text x="2631.5" y="92" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">their brothers, of their fathers’ houses:</text><text x="2500.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Michael</text><text x="2602" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Meshullam</text><text x="2697" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Sheba</text><text x="2772" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Jorai</text><text x="2566.5" y="184" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Jacan</text><text x="2635" y="184" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Zia</text><text x="2700" y="184" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif">Eber</text><text x="2700" y="199" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· seven</text><text x="2869" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">the sons of Abihail — his line:</text><text x="3187.5" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Abihail</text><text x="3187.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Huri</text><text x="3187.5" y="208" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Jaroah</text><text x="3187.5" y="266" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Gilead</text><text x="3187.5" y="324" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Michael</text><text x="3187.5" y="382" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Jeshishai</text><text x="3187.5" y="440" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Jahdo</text><text x="3187.5" y="498" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Buz</text><text x="3379.5" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Ahi</text><text x="3379.5" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· son of Abdiel, son of Guni</text><text x="3525" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">listed in the days of Jotham of Judah</text><text x="3525" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">and Jeroboam of Israel</text><rect x="4045" y="8" width="1965"
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576" font-family="Georgia, 'Times New Roman', serif"><rect x="0" y="0" width="1024" height="576" fill="rgb(16,16,24)"/><g><animateTransform attributeName="transform" attributeType="XML" type="translate" values="-6034.96 191.52;-4490.35 223.18;-6679.52 191.52" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/><g><animateTransform attributeName="transform" attributeType="XML" type="scale" values="1.12;0.82;1.12" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/><rect x="0" y="8" width="1796" height="534" rx="18" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><text x="898" y="259" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Reuben, the firstborn</text><text x="898" y="293" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 1–10</text><rect x="2036" y="8" width="1769" height="534" rx="18" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><text x="2920.5" y="259" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The sons of Gad</text><text x="2920.5" y="293" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 11–17</text><text x="4065" y="26" font-size="30" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The war with the Hagrites</text><polyline points="4775.5,105 4775.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="4686.5,132 4859.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="4686.5,132 4686.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="4770.5,132 4770.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="4859.5,132 4859.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="5471.5,105 5471.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="5336,132 5603.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="5336,132 5336,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="5426,132 5426,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="5515,132 5515,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="5603.5,132 5603.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><text x="4065" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Reuben, Gad, and half-Manasseh:</text><text x="4474" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">44,760 men</text><text x="4474" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· able for war, skillful with bow and…</text><text x="4775.5" y="92" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">they made war with the Hagrites —</text><text x="4686.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Jetur</text><text x="4770.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Naphish</text><text x="4859.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Nodab</text><text x="4972" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">they cried to God in the battle, and he</text><text x="4972" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">answered, because they trusted in him</text><text x="5471.5" y="92" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">they took away:</text><text x="5336" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">50,000</text><text x="5336" y="165" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· camels</text><text x="5426" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">250,000</text><text x="5426" y="165" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· sheep</text><text x="5515" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">2,000</text><text x="5515" y="165" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· donkeys</text><text x="5603.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">100,000</text><text x="5603.5" y="165" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· men</text><text x="5711" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">many fell slain, for the war was of God;</text><text x="5711" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">they lived there until the captivity</text><text x="6270" y="26" font-size="30" text-anchor="start" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The half-tribe of Manasseh</text><polyline points="6840.5,105 6840.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="6683,132 6945,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="6737.5,132 6737.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="6808.5,132 6808.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="6873.5,132 6873.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="6945,132 6945,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="6683,132 6683,171" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="6784.5,132 6784.5,171" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="6942,132 6942,171" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="8120.5,105 8120.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="7961.5,132 8236,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="7961.5,132 7961.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="8041,132 8041,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="8117,132 8117,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="8236,132 8236,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><text x="6270" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">they increased from Bashan to Baal Hermon,</text><text x="6270" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Senir, and Mount Hermon</text><text x="6840.5" y="92" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">the heads of their fathers’ houses:</text><text x="6737.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Epher</text><text x="6808.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Ishi</text><text x="6873.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Eliel</text><text x="6945" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Azriel</text><text x="6683" y="184" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Jeremiah</text><text x="6784.5" y="184" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Hodaviah</text><text x="6942" y="184" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Jahdiel</text><text x="6942" y="199" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· mighty men of valor, famous men</text><text x="7109" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">but they played the prostitute after the gods</text><text x="7109" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">of the peoples of the land — so God stirred up</text><text x="7531" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Pul</text><text x="7531" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· king of Assyria</text><text x="7756" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Tilgath Pilneser</text><text x="7756" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· king of Assyria — who carried…</text><text x="8120.5" y="92" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Reuben, Gad, and half-Manasseh, to</text><text x="7961.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Halah</text><text x="8041" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Habor</text><text x="8117" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Hara</text><text x="8236" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Gozan</text><text x="8236" y="165" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· the river of — to this day</text><line x1="6270" y1="103" x2="6552" y2="103" stroke="rgb(255,244,170)" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.55;1" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></line><line x1="6270" y1="127" x2="6434" y2="127" stroke="rgb(255,244,170)" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.55;1" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></line></g></g><rect x="0" y="0" width="1024" height="74" fill="rgb(16,16,24)" fill-opacity="0.910"/><rect x="0" y="534" width="1024" height="42" fill="rgb(16,16,24)" fill-opacity="0.910"/><text x="28" y="20" font-size="24" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The half-tribe of Manasseh — 1 Chronicles 5</text><text x="28" y="52" font-size="18" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verse 23 — The children of the half-tribe of Manasseh lived in the land: they increased from Bashan to Baal…</text><text x="28" y="550" font-size="14" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">names as spelled in the World English Bible</text><text x="996" y="550" font-size="14" text-anchor="end" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">1 Chronicles 5:23</text></svg>
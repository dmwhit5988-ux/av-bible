</text><text x="13423" y="200" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Asaiah</text><text x="13500.5" y="200" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Adiel</text><text x="13582" y="200" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Jesimiel</text><text x="13674" y="200" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Benaiah</text><text x="13851" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">and Ziza — his line, each the son of the next:</text><text x="14257" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Ziza</text><text x="14257" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Shiphi</text><text x="14257" y="208" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Allon</text><text x="14257" y="266" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Jedaiah</text><text x="14257" y="324" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Shimri</text><text x="14257" y="382" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Shemaiah</text><text x="14370" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">their fathers’ houses increased greatly</text><text x="14370" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">they went to Gedor to seek pasture,</text><text x="14370" y="140" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">and struck the Meunim in Hezekiah’s days</text><text x="14894.5" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Ishi</text><text x="14894.5" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· his sons led five hundred to Mount…</text><text x="14758" y="166" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Pelatiah</text><text x="14850" y="166" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Neariah</text><text x="14947.5" y="166" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Rephaiah</text><text x="15038" y="166" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Uzziel</text><text x="15138" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">they struck the remnant of the Amalekites,</text><text x="15138" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">and have lived there to this day</text><line x1="14370" y1="127" x2="14592" y2="127" stroke="rgb(255,244,170)" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.55;1" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></line></g></g><rect x="0" y="0" width="1024" height="74" fill="rgb(16,16,24)" fill-opacity="0.910"/><rect x="0" y="534" width="1024" height="42" fill="rgb(16,16,24)" fill-opacity="0.910"/><text x="28" y="20" font-size="24" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The princes of Simeon — 1 Chronicles 4</text><text x="28" y="52" font-size="18" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verse 39 — They went to the entrance of Gedor, even to the east side of the valley, to seek pasture for their flocks.</text><text x="28" y="550" font-size="14" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">names as spelled in the World English Bible</text><text x="996" y="550" font-size="14" text-anchor="end" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">1 Chronicles 4:39</text></svg>
yline points="13500.5,132 13500.5,187" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="13582,132 13582,187" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="13674,132 13674,187" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="14257,105 14257,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="14257,163 14257,195" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="14257,221 14257,253" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="14257,279 14257,311" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="14257,337 14257,369" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><polyline points="14894.5,105 14894.5,148" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="14758,148 15038,148" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="14758,148 14758,153" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="14850,148 14850,153" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="14947.5,148 14947.5,153" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><polyline points="15038,148 15038,153" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><text x="13442.5" y="92" font-
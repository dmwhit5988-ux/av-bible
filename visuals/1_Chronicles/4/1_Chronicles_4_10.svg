<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576" font-family="Georgia, 'Times New Roman', serif"><rect x="0" y="0" width="1024" height="576" fill="rgb(16,16,24)"/><g><animateTransform attributeName="transform" attributeType="XML" type="translate" values="-3033.92 196;-3409.68 137.76" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.42 0 0.58 1"/><g><animateTransform attributeName="transform" attributeType="XML" type="scale" values="1.12;1.12" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.42 0 0.58 1"/><rect x="0" y="8" width="2801" height="360" rx="18" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><text x="1400.5" y="172" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Families of Judah</text><text x="1400.5" y="206" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 1–8</text><text x="3061" y="26" font-size="30" text-anchor="start" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The prayer of Jabez</text><text x="3166" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Jabez</text><text x="3166" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· more honorable than his…</text><text x="3341" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">he called on the God of Israel:</text><text x="3341" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">“Oh that you would bless me indeed,</text><text x="3341" y="140" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">and enlarge my border!</text><text x="3341" y="164" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">May your hand be with me, and may you</text><text x="3341" y="188" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">keep me from evil, that I may not cause pain!”</text><text x="3341" y="212" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">— and God granted him that which he requested</text><rect x="3932" y="8" width="1622" height="318" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><text x="4743" y="151" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Kenaz and Caleb's families</text><text x="4743" y="185" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 11–15</text><rect x="5794" y="8" width="2721" height="260" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><text x="7154.5" y="122" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">More families of Judah</text><text x="7154.5" y="156" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 16–20</text><rect x="8755" y="8" width="1261" height="252" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><text x="9385.5" y="118" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The sons of Shelah</text><text x="9385.5" y="152" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 21–23</text><rect x="10256" y="8" width="526" height="534" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><text x="10519" y="259" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The sons of Simeon</text><text x="10519" y="293" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 24–27</text><rect x="11022" y="8" width="1822" height="220" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><text x="11933" y="102" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Where Simeon settled</text><text x="11933" y="136" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 28–33</text><rect x="13084" y="8" width="2368" height="418" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><text x="14268" y="201" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The princes of Simeon</text><text x="14268" y="235" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 34–43</text><line x1="3341" y1="103" x2="3527" y2="103" stroke="rgb(255,244,170)" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.55;1" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></line><line x1="3341" y1="127" x2="3568" y2="127" stroke="rgb(255,244,170)" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.55;1" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></line><line x1="3341" y1="151" x2="3490" y2="151" stroke="rgb(255,244,170)" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.55;1" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></line><line x1="3341" y1="175" x2="3599" y2="175" stroke="rgb(255,244,170)" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.55;1" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></line><line x1="3341" y1="199" x2="3627" y2="199" stroke="rgb(255,244,170)" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.55;1" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></line><line x1="3341" y1="223" x2="3642" y2="223" stroke="rgb(255,244,170)" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.55;1" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></line></g></g><rect x="0" y="0" width="1024" height="74" fill="rgb(16,16,24)" fill-opacity="0.910"/><rect x="0" y="534" width="1024" height="42" fill="rgb(16,16,24)" fill-opacity="0.910"/><text x="28" y="20" font-size="24" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The prayer of Jabez — 1 Chronicles 4</text><text x="28" y="52" font-size="18" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verse 10 — Jabez called on the God of Israel, saying, “Oh that you would bless me indeed, and enlarge my border!…</text><text x="28" y="550" font-size="14" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">names as spelled in the World English Bible</text><text x="996" y="550" font-size="14" text-anchor="end" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">1 Chronicles 4:10</text></svg>
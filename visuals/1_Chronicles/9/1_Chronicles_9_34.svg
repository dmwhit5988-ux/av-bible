<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576" font-family="Georgia, 'Times New Roman', serif"><rect x="0" y="0" width="1024" height="576" fill="rgb(16,16,24)"/><g><animateTransform attributeName="transform" attributeType="XML" type="translate" values="-10654.96 137.76;-10648.24 84" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.42 0 0.58 1"/><g><animateTransform attributeName="transform" attributeType="XML" type="scale" values="1.12;1.12" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.42 0 0.58 1"/><rect x="0" y="8" width="1178" height="200" rx="18" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><text x="589" y="92" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The first to return</text><text x="589" y="126" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 1–3</text><rect x="1418" y="8" width="2138" height="360" rx="18" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><text x="2487" y="172" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Of Judah and Benjamin in Jerusalem</text><text x="2487" y="206" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 4–9</text><rect x="3796" y="8" width="1218" height="418" rx="18" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><text x="4405" y="201" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The priests</text><text x="4405" y="235" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 10–13</text><rect x="5254" y="8" width="1293" height="302" rx="18" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><text x="5900.5" y="143" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The Levites</text><text x="5900.5" y="177" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 14–16</text><rect x="6787" y="8" width="2173" height="368" rx="18" fill="none" stroke="rgb(138,129,95)" stroke-width="2"/><text x="7873.5" y="176" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The gatekeepers</text><text x="7873.5" y="210" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 17–27</text><text x="9220" y="26" font-size="30" text-anchor="start" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Duties of the temple service</text><text x="9220" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">some kept the vessels of service,</text><text x="9220" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">brought in and out by count</text><text x="9220" y="140" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">some kept the furniture and the vessels of</text><text x="9220" y="164" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">the sanctuary: the fine flour, the wine, the oil,</text><text x="9220" y="188" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">the frankincense, and the spices</text><text x="9220" y="212" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">sons of the priests mixed the spices</text><text x="9680.5" y="92" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif">Mattithiah</text><text x="9680.5" y="107" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">· over the things baked in pans</text><text x="9835" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Kohathites prepared the show bread</text><text x="9835" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">every Sabbath</text><text x="9835" y="140" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">the singers lived in the rooms, free from</text><text x="9835" y="164" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">other service — employed day and night</text><text x="9835" y="188" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">heads of Levite households; they lived</text><text x="9835" y="212" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">at Jerusalem</text><rect x="10376" y="8" width="2400" height="956" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2"/><text x="11576" y="470" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The house of Saul, again</text><text x="11576" y="504" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 35–44</text><line x1="9835" y1="199" x2="10074" y2="199" stroke="rgb(255,244,170)" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.55;1" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></line><line x1="9835" y1="223" x2="9916" y2="223" stroke="rgb(255,244,170)" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.55;1" dur="2.6s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/></line></g></g><rect x="0" y="0" width="1024" height="74" fill="rgb(16,16,24)" fill-opacity="0.910"/><rect x="0" y="534" width="1024" height="42" fill="rgb(16,16,24)" fill-opacity="0.910"/><text x="28" y="20" font-size="24" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Duties of the temple service — 1 Chronicles 9</text><text x="28" y="52" font-size="18" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verse 34 — These were heads of fathers’ households of the Levites, throughout their generations, chief men. These…</text><text x="28" y="550" font-size="14" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">names as spelled in the World English Bible</text><text x="996" y="550" font-size="14" text-anchor="end" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">1 Chronicles 9:34</text></svg>
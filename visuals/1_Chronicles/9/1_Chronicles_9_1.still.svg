<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" width="1024" height="576" font-family="Georgia, 'Times New Roman', serif"><rect x="0" y="0" width="1024" height="576" fill="rgb(16,16,24)" /><g transform="translate(336.16 164.64)"><g transform="scale(1.12)"><text x="20" y="26" font-size="30" text-anchor="start" dominant-baseline="central" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The first to return</text><polyline points="582.5,105 582.5,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="392.5,132 727,132" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="392.5,132 392.5,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="483,132 483,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="590,132 590,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><polyline points="727,132 727,137" stroke-linejoin="round" stroke-linecap="round" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="20" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">all Israel was listed by genealogies —</text><text x="20" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">written in the book of the kings of Israel;</text><text x="20" y="140" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Judah was carried to Babylon</text><text x="20" y="164" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">for their disobedience</text><text x="582.5" y="92" font-size="11" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">the first to live again in their cities:</text><text x="392.5" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">Israel</text><text x="483" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">the priests</text><text x="590" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">the Levites</text><text x="727" y="150" font-size="15" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif">the temple servants</text><text x="871" y="92" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">and in Jerusalem lived children of Judah,</text><text x="871" y="116" font-size="14" text-anchor="start" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Benjamin, Ephraim, and Manasseh</text><rect x="1418" y="8" width="2138" height="360" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="2487" y="172" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Of Judah and Benjamin in Jerusalem</text><text x="2487" y="206" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 4–9</text><rect x="3796" y="8" width="1218" height="418" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="4405" y="201" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The priests</text><text x="4405" y="235" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 10–13</text><rect x="5254" y="8" width="1293" height="302" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="5900.5" y="143" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The Levites</text><text x="5900.5" y="177" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 14–16</text><rect x="6787" y="8" width="2173" height="368" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="7873.5" y="176" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The gatekeepers</text><text x="7873.5" y="210" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 17–27</text><rect x="9200" y="8" width="936" height="248" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="9668" y="116" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Duties of the temple service</text><text x="9668" y="150" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 28–34</text><rect x="10376" y="8" width="2400" height="956" rx="18" fill="none" stroke="rgb(74,70,56)" stroke-width="2" /><text x="11576" y="470" font-size="30" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The house of Saul, again</text><text x="11576" y="504" font-size="18" text-anchor="middle" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verses 35–44</text><line x1="20" y1="103" x2="253" y2="103" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><line x1="20" y1="127" x2="274" y2="127" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><line x1="20" y1="151" x2="208" y2="151" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /><line x1="20" y1="175" x2="156" y2="175" stroke="rgb(255,244,170)" stroke-width="2" opacity="1" /></g></g><rect x="0" y="0" width="1024" height="74" fill="rgb(16,16,24)" fill-opacity="0.910" /><rect x="0" y="534" width="1024" height="42" fill="rgb(16,16,24)" fill-opacity="0.910" /><text x="28" y="20" font-size="24" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(216,198,143)" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">The first to return — 1 Chronicles 9</text><text x="28" y="52" font-size="18" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(255,244,170)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">verse 1 — So all Israel were listed by genealogies; and behold, they are written in the book of the kings of Israel.…</text><text x="28" y="550" font-size="14" text-anchor="start" dominant-baseline="text-before-edge" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">names as spelled in the World English Bible</text><text x="996" y="550" font-size="14" text-anchor="end" dominant-baseline="central" fill="rgb(140,130,100)" font-family="Georgia, 'Times New Roman', serif" font-style="italic">1 Chronicles 9:1</text></svg>
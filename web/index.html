<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>AV Bible</title>
<meta name="theme-color" content="#101018">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AV Bible">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="pickers">
    <label>Translation
      <select id="sel-translation"></select>
    </label>
    <label>Book
      <select id="sel-book"></select>
    </label>
    <label>Chapter
      <select id="sel-chapter"></select>
    </label>
    <label>Start at verse
      <select id="sel-verse"></select>
    </label>
  </div>
  <div class="attribution" id="attribution"></div>
</header>

<div id="stage-wrap">
  <div id="stage">
    <div id="stage-bg"></div>
    <img id="stage-img" alt="">
    <div id="stage-text"></div>
    <div id="idle-message">AV Bible

Choose a passage and press Play</div>
    <div id="notes-box"></div>
    <div id="reference-box"></div>
  </div>
  <button id="btn-stage-play" aria-label="Play">&#9658;</button>
  <button id="btn-fullscreen" aria-label="Toggle full screen">&#9974;</button>
</div>

<div id="controls">
  <button id="btn-prev" aria-label="Previous verse">&#8592; Prev</button>
  <button id="btn-play" class="primary" aria-label="Play or pause">&#9658; Play</button>
  <button id="btn-next" aria-label="Next verse">Next &#8594;</button>
  <div id="verse-progress">&nbsp;</div>
</div>

<div class="toggles">
  <label><input type="checkbox" id="chk-notes"> Notes</label>
  <label><input type="checkbox" id="chk-reference"> Reference</label>
  <label for="rate-slider">Speed
    <input type="range" id="rate-slider" min="0.6" max="1.6" step="0.1" value="1">
  </label>
</div>

<div id="verse-panel"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
